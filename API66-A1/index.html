<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levi Ekermen</title>
    <link rel="stylesheet" href="style.css">
    <script src="ucup.js"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #3E2723; /* warna coklat gelap */
            font-family: 'Arial', sans-serif;
            color: #FFF8E1;
            text-align: center;
        }
        .container {
            max-width: 500px;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 0.5em;
        }
        p {
            font-size: 1.2em;
        }
        .loader {
            margin-top: 2em;
            border: 6px solid #FFF8E1;
            border-top: 6px solid #BCAAA4;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-left: auto;
            margin-right: auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Levi Ekermen</h1>
        <p>Mohon ditunggu, kami akan mengoptimalkan pengalaman untuk Anda...</p>
        <div class="loader"></div>
    </div>
</body>
</html>
