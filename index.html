<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levi Ekermen</title>

    <script src="ucup.js"></script>

    <style>
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
            background:#3E2723;
            color:#fff;
            font-family:Arial;
            text-align:center;
        }

        .loader{
            width:50px;
            height:50px;
            border:6px solid #fff;
            border-top:6px solid gray;
            border-radius:50%;
            animation:spin 1s linear infinite;
            margin:auto;
        }

        @keyframes spin{
            from{transform:rotate(0)}
            to{transform:rotate(360deg)}
        }
    </style>

</head>
<body>

<h2>Mohon tunggu...</h2>

<div class="loader"></div>

</body>
</html>
